<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Fuel App FIX FINAL</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:sans-serif;background:#0f172a;color:#e2e8f0;margin:0}
.container{max-width:900px;margin:auto;padding:15px}
.card{background:#1e293b;padding:15px;margin-top:15px;border-radius:12px}
input,select{padding:8px;margin:5px;border-radius:8px;border:none;background:#334155;color:white}
button{padding:6px 12px;background:#38bdf8;border:none;border-radius:6px;cursor:pointer}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:6px;border-bottom:1px solid #475569;text-align:center}
</style>
</head>

<body>
<div class="container">

<h2>⛽ Fuel App FIX FINAL</h2>

<div class="card">
<select id="carSelect"></select>
<input id="newCar" placeholder="ชื่อรถ">
<input id="tankSize" placeholder="ความจุถัง">
<button onclick="addCar()">➕ เพิ่มรถ</button>
</div>

<div class="card">
<form id="form">
<input type="date" id="date">
<input id="km" placeholder="กิโล">

<input type="range" id="fuelLevel" min="1" max="5" step="0.5" value="3"
oninput="fuelValue.innerText=this.value">
<span id="fuelValue">3</span>

<input id="liter" placeholder="ลิตร">
<input id="price" placeholder="ราคา">
<input id="total" readonly>
<input id="additive" placeholder="หัวเชื้อ">
<button>บันทึก</button>
</form>
</div>

<div class="card">
<select id="chartCarSelect"></select>
</div>

<div class="card" style="height:320px;">
<canvas id="chart"></canvas>
<div id="noData"></div>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>วันที่</th>
<th>รถ</th>
<th>กิโล</th>
<th>ขีด</th>
<th>ลิตร</th>
<th>ราคา</th>
<th>เงิน</th>
<th>หัวเชื้อ</th>
<th>จัดการ</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>
let db = JSON.parse(localStorage.getItem("fuelDB")) || {};
let cars = JSON.parse(localStorage.getItem("cars")) || {};
let currentCar = localStorage.getItem("currentCar");
let editIndex = -1;

function save(){
 localStorage.setItem("fuelDB", JSON.stringify(db));
 localStorage.setItem("cars", JSON.stringify(cars));
 localStorage.setItem("currentCar", currentCar);
}

function num(v){
 let n=parseFloat(v);
 return isNaN(n)?NaN:n;
}

/* ================= INIT FIX (ตัวจบปัญหา) ================= */
function init(){
 let keys = Object.keys(db);

 if(keys.length === 0){
  currentCar = "";
  render();
  return;
 }

 // 👉 FIX: เลือกคันแรกเสมอ
 if(!currentCar || !db[currentCar]){
  currentCar = keys[0];
 }

 save();
 update();
 render();
}

/* ================= CAR ================= */

function addCar(){
 let n=newCar.value.trim();
 let t=parseFloat(tankSize.value);

 if(!n || isNaN(t)) return;

 db[n] = [];
 cars[n] = {tank:t};

 currentCar = n;

 save();
 update();
 render();

 newCar.value="";
 tankSize.value="";
}

/* ================= UPDATE ================= */

function update(){
 carSelect.innerHTML="";
 chartCarSelect.innerHTML="";

 Object.keys(db).forEach(c=>{
  let o1=new Option(c+" ("+cars[c].tank+"L)", c);
  carSelect.appendChild(o1);

  let o2=new Option(c, c);
  chartCarSelect.appendChild(o2);
 });

 carSelect.value = currentCar;
 chartCarSelect.value = currentCar;
}

/* ================= EVENTS ================= */

carSelect.onchange=()=>{
 currentCar = carSelect.value;
 save();
 render();
};

chartCarSelect.onchange=()=>{
 currentCar = chartCarSelect.value;
 save();
 render();
};

/* ================= FORM ================= */

liter.oninput=()=> total.value=(num(liter.value)*num(price.value)).toFixed(2);
price.oninput=()=> total.value=(num(liter.value)*num(price.value)).toFixed(2);

form.onsubmit=e=>{
 e.preventDefault();

 if(!currentCar || !date.value || isNaN(num(km.value)) || isNaN(num(liter.value))){
  alert("กรอกข้อมูลให้ครบ");
  return;
 }

 let obj={
  date:date.value,
  km:num(km.value),
  fuelLevel:parseFloat(fuelLevel.value),
  liter:num(liter.value),
  price:num(price.value)||0,
  additive:num(additive.value)||0
 };

 if(!db[currentCar]) db[currentCar]=[];

 db[currentCar].push(obj);

 save();
 render();

 date.valueAsDate=new Date();
 km.value=""; liter.value=""; price.value=""; additive.value="";
 total.value=""; fuelLevel.value=3; fuelValue.innerText=3;
};

/* ================= TABLE ================= */

function render(){

 let data = db[currentCar] || [];

 carSelect.value = currentCar;
 chartCarSelect.value = currentCar;

 let table = document.getElementById("table");
 let noData = document.getElementById("noData");

 table.innerHTML = "";
 noData.innerHTML = "";

 if(!currentCar || data.length === 0){
  drawChart([],[],noData,currentCar);
  return;
 }

 data.sort((a,b)=>new Date(a.date)-new Date(b.date));

 for(let i=0;i<data.length;i++){
  let d=data[i];
  let total=(d.liter*d.price||0).toFixed(2);

  table.innerHTML+=`
  <tr>
  <td>${d.date}</td>
  <td>${currentCar}</td>
  <td>${d.km}</td>
  <td>${d.fuelLevel}</td>
  <td>${d.liter}</td>
  <td>${d.price||"-"}</td>
  <td>${total}</td>
  <td>${d.additive||"-"}</td>
  </tr>`;
 }

 let labels=[];
 let values=[];

 for(let i=1;i<data.length;i++){
  let diff = data[i].km - data[i-1].km;
  if(isFinite(diff)){
   labels.push(data[i].date);
   values.push(diff);
  }
 }

 drawChart(labels,values,noData,currentCar);
}

/* ================= CHART ================= */

function drawChart(labels,data,noData,name){

 let ctx=document.getElementById("chart").getContext("2d");

 if(window.chart) window.chart.destroy();

 if(!labels || labels.length===0){
  noData.innerHTML="⚠️ ยังไม่มีข้อมูลกราฟ";
  return;
 }

 window.chart=new Chart(ctx,{
  type:'bar',
  data:{
   labels:labels,
   datasets:[{
    label:'km ('+name+')',
    data:data,
    backgroundColor:'#38bdf8'
   }]
  },
  options:{
   responsive:true,
   maintainAspectRatio:false
  }
 });
}

/* START */
init();
</script>

</body>
</html>
