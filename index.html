<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Fuel System - Trip Reset Mode</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {font-family:sans-serif;background:#0f172a;color:#e2e8f0;margin:0;}
.container{max-width:900px;margin:auto;padding:15px;}
.card{background:#1e293b;padding:15px;margin-top:15px;border-radius:12px;}
input,select{padding:8px;margin:5px;border-radius:8px;border:none;background:#334155;color:white;width:140px;}
button{padding:8px 15px;background:#38bdf8;border:none;border-radius:6px;cursor:pointer;font-weight:bold;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{padding:10px;border-bottom:1px solid #475569;text-align:center;}
</style>
</head>
<body>

<div class="container">
  <h2>⛽ Fuel App (Trip 0 Mode)</h2>
  <p style="color:#94a3b8; font-size:0.9em;">*กรอกระยะทางที่วิ่งได้จริงจาก Trip Meter (ที่เซ็ต 0 ไว้)</p>

  <div class="card">
    <select id="carSelect"></select>
    <input id="newCar" placeholder="ชื่อรถ">
    <button onclick="addCar()">➕ เพิ่มรถ</button>
  </div>

  <div class="card">
    <form id="form">
      <input type="date" id="date">
      <input id="km" type="number" step="any" placeholder="ระยะทางที่วิ่งได้ (km)">
      <input id="liter" type="number" step="any" placeholder="จำนวนลิตร">
      <input id="price" type="number" step="any" placeholder="ราคาน้ำมัน">
      <button type="submit">บันทึก</button>
    </form>
  </div>

  <div class="card" style="height:350px;">
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>วันที่</th>
          <th>ระยะทาง (Trip)</th>
          <th>ลิตร</th>
          <th>ยอดเงิน</th>
          <th>จัดการ</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>
</div>

<script>
let db = JSON.parse(localStorage.getItem("fuelDB")) || {};
let currentCar = localStorage.getItem("currentCar") || "";
let myChart = null;
let editIndex = -1;

function init() {
    let keys = Object.keys(db);
    if(keys.length > 0 && !currentCar) currentCar = keys[0];
    date.valueAsDate = new Date();
    updateUI();
    render();
}

function save() {
    localStorage.setItem("fuelDB", JSON.stringify(db));
    localStorage.setItem("currentCar", currentCar);
}

function addCar() {
    let n = newCar.value.trim();
    if(!n) return;
    if(!db[n]) db[n] = [];
    currentCar = n;
    save(); updateUI(); render();
    newCar.value = "";
}

function updateUI() {
    carSelect.innerHTML = "";
    Object.keys(db).forEach(c => carSelect.add(new Option(c, c)));
    carSelect.value = currentCar;
}

carSelect.onchange = () => { currentCar = carSelect.value; save(); render(); };

form.onsubmit = e => {
    e.preventDefault();
    if(!currentCar) return alert("เพิ่มรถก่อนครับ");
    
    let obj = {
        date: date.value,
        km: parseFloat(km.value) || 0, // นี่คือระยะทางที่วิ่งได้จริง (Trip)
        liter: parseFloat(liter.value) || 0,
        price: parseFloat(price.value) || 0
    };

    if(editIndex === -1) db[currentCar].push(obj);
    else { db[currentCar][editIndex] = obj; editIndex = -1; }

    save(); render();
    km.value = ""; liter.value = ""; price.value = "";
};

function deleteRow(i) {
    if(confirm("ลบข้อมูล?")) { db[currentCar].splice(i, 1); save(); render(); }
}

function render() {
    let data = db[currentCar] || [];
    let tableBody = document.getElementById("table");
    tableBody.innerHTML = "";
    
    // เรียงวันที่
    data.sort((a, b) => new Date(a.date) - new Date(b.date));

    // 1. แสดงตาราง
    data.forEach((d, i) => {
        tableBody.innerHTML += `
            <tr>
                <td>${d.date}</td>
                <td>${d.km} กม.</td>
                <td>${d.liter} ลิตร</td>
                <td>${(d.liter * d.price).toFixed(2)}</td>
                <td><button onclick="deleteRow(${i})" style="background:#ef4444">🗑️</button></td>
            </tr>`;
    });

    // 2. ลอจิกใหม่: รวมผลรวม KM รายสัปดาห์ (โหมด Trip Reset)
    let weeklyTotals = {};
    data.forEach(d => {
        let dt = new Date(d.date);
        let label = `${dt.getMonth()+1}.${Math.ceil(dt.getDate()/7)}`; // เดือน.อาทิตย์
        
        // เอาเลข KM ที่กรอก มาบวกสะสมได้เลย เพราะคุณ reset 0 มาแล้ว
        weeklyTotals[label] = (weeklyTotals[label] || 0) + d.km;
    });

    let labels = Object.keys(weeklyTotals).sort((a, b) => parseFloat(a) - parseFloat(b));
    let values = labels.map(l => weeklyTotals[l]);

    drawChart(labels, values);
}

function drawChart(labels, values) {
    let ctx = document.getElementById("chart").getContext("2d");
    if(myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'ระยะทางรวมต่อสัปดาห์ (km)',
                data: values,
                backgroundColor: '#38bdf8'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { y: { beginAtZero: true } }
        }
    });
}

init();
</script>
</body>
</html>
