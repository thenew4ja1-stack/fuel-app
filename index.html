<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Fuel System PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {font-family:sans-serif;background:#0f172a;color:#e2e8f0;margin:0;}
.container{max-width:900px;margin:auto;padding:15px;}
.card{background:#1e293b;padding:15px;margin-top:15px;border-radius:12px;}
input,select{padding:8px;margin:5px;border-radius:8px;border:none;background:#334155;color:white;}
button{padding:6px 12px;background:#38bdf8;border:none;border-radius:6px;cursor:pointer;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{padding:6px;border-bottom:1px solid #475569;text-align:center;}
</style>
</head>

<body>
<div class="container">

<h2>⛽ Fuel System PRO</h2>

<!-- CAR CONTROL -->
<div class="card">
<select id="carSelect"></select>
<input id="newCar" placeholder="ชื่อรถ">
<input id="tankSize" placeholder="ความจุถัง">
<button onclick="addCar()">➕ เพิ่มรถ</button>
<button onclick="loadEditCar()">✏️ แก้รถ</button>
<button onclick="deleteCar()">🗑️ ลบรถ</button>

<div id="editBox" style="display:none;margin-top:10px;">
<input id="editCarName" placeholder="ชื่อรถใหม่">
<input id="editTankSize" placeholder="ความจุถังใหม่">
<button onclick="saveEditCar()">💾 บันทึกแก้ไข</button>
</div>

</div>

<!-- FORM -->
<div class="card">
<form id="form">
<input type="date" id="date">
<input id="km" placeholder="กิโล">

<input type="range" id="fuelLevel" min="1" max="5" step="0.5" value="3"
oninput="fuelValue.innerText=this.value">
<span id="fuelValue">3</span>

<input id="liter" placeholder="ลิตร">
<input id="price" placeholder="ราคา">
<input id="total" readonly>
<input id="additive" placeholder="หัวเชื้อ">
<button>บันทึก</button>
</form>
</div>

<!-- CHART -->
<div class="card">
<select id="chartCarSelect"></select>
</div>

<div class="card" style="height:320px;">
<canvas id="chart"></canvas>
<div id="noData"></div>
</div>

<!-- TABLE -->
<div class="card">
<table>
<thead>
<tr>
<th>วันที่</th>
<th>รถ</th>
<th>กิโล</th>
<th>ขีด</th>
<th>ลิตร</th>
<th>ราคา</th>
<th>เงิน</th>
<th>หัวเชื้อ</th>
<th>จัดการ</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>
let db=JSON.parse(localStorage.getItem("fuelDB"))||{};
let cars=JSON.parse(localStorage.getItem("cars"))||{};
let currentCar=localStorage.getItem("currentCar")||"";
let editIndex=-1;

function save(){
 localStorage.setItem("fuelDB",JSON.stringify(db));
 localStorage.setItem("cars",JSON.stringify(cars));
 localStorage.setItem("currentCar",currentCar);
}

function num(v){
 let n=parseFloat(v);
 return isNaN(n)?NaN:n;
}

function getMonthWeek(dateStr){
 let d=new Date(dateStr);
 let y=d.getFullYear();
 let m=d.getMonth()+1;
 let w=Math.ceil(d.getDate()/7);
 return y+"-"+m+"."+w;
}

/* ================= CAR ================= */

function addCar(){
 let n=newCar.value.trim();
 let t=parseFloat(tankSize.value);
 if(!n||isNaN(t)) return alert("กรอกข้อมูลรถ");

 db[n]=[];
 cars[n]={tank:t};
 currentCar=n;

 save(); update(); render();

 newCar.value=""; tankSize.value="";
}

function loadEditCar(){
 if(!currentCar) return;
 editBox.style.display="block";
 editCarName.value=currentCar;
 editTankSize.value=cars[currentCar].tank;
}

function saveEditCar(){
 let newName=editCarName.value.trim();
 let newTank=parseFloat(editTankSize.value);

 if(!newName||isNaN(newTank)) return alert("ข้อมูลไม่ครบ");

 if(newName!==currentCar){
  db[newName]=db[currentCar];
  delete db[currentCar];

  cars[newName]=cars[currentCar];
  delete cars[currentCar];

  currentCar=newName;
 }

 cars[currentCar].tank=newTank;

 save(); update(); render();
 editBox.style.display="none";
}

function deleteCar(){
 if(!currentCar) return;
 if(!confirm("ลบรถนี้ทั้งหมด?")) return;

 delete db[currentCar];
 delete cars[currentCar];
 currentCar=Object.keys(db)[0]||"";

 save(); update(); render();
}

/* ================= UI ================= */

function update(){
 carSelect.innerHTML="";
 chartCarSelect.innerHTML="";

 Object.keys(db).forEach(c=>{
  let o1=new Option(c+" ("+cars[c].tank+"L)",c);
  if(c===currentCar)o1.selected=true;
  carSelect.appendChild(o1);

  let o2=new Option(c,c);
  chartCarSelect.appendChild(o2);
 });

 chartCarSelect.value=currentCar;
}

/* ================= FORM ================= */

carSelect.onchange=()=>{
 currentCar=carSelect.value;
 save(); render();
};

chartCarSelect.onchange=()=>render();

liter.oninput=calc;
price.oninput=calc;

function calc(){
 let l=num(liter.value);
 let p=num(price.value);
 total.value=(!isNaN(l)&&!isNaN(p))?(l*p).toFixed(2):"";
}

form.onsubmit=e=>{
 e.preventDefault();
 if(!currentCar) return;

 if(!date.value || isNaN(num(km.value)) || isNaN(num(liter.value))){
  alert("กรอกให้ครบ");
  return;
 }

 let obj={
  date:date.value,
  km:num(km.value),
  fuelLevel:parseFloat(fuelLevel.value),
  liter:num(liter.value),
  price:num(price.value)||0,
  additive:num(additive.value)||0
 };

 if(editIndex===-1){
  db[currentCar].push(obj);
 }else{
  db[currentCar][editIndex]=obj;
  editIndex=-1;
 }

 save(); render();

 date.valueAsDate=new Date();
 km.value=""; liter.value=""; price.value=""; additive.value="";
 total.value=""; fuelLevel.value=3; fuelValue.innerText=3;
};

/* ================= TABLE ================= */

function editRow(i){
 let d=db[currentCar][i];
 date.value=d.date;
 km.value=d.km;
 fuelLevel.value=d.fuelLevel;
 fuelValue.innerText=d.fuelLevel;
 liter.value=d.liter;
 price.value=d.price;
 additive.value=d.additive;
 editIndex=i;
}

function deleteRow(i){
 if(!confirm("ลบรายการนี้?")) return;
 db[currentCar].splice(i,1);
 save(); render();
}

/* ================= RENDER ================= */

function render(){
 let base=currentCar;
 let data=db[base]||[];

 let table=document.getElementById("table");
 let noData=document.getElementById("noData");

 table.innerHTML="";
 noData.innerHTML="";

 data.sort((a,b)=>new Date(a.date)-new Date(b.date));

 for(let i=0;i<data.length;i++){
  let d=data[i];
  let total=(d.liter*d.price||0).toFixed(2);

  table.innerHTML+=`
  <tr>
  <td>${d.date}</td>
  <td>${base}</td>
  <td>${d.km}</td>
  <td>${d.fuelLevel}</td>
  <td>${d.liter}</td>
  <td>${d.price||"-"}</td>
  <td>${total}</td>
  <td>${d.additive||"-"}</td>
  <td>
  <button onclick="editRow(${i})">✏️</button>
  <button onclick="deleteRow(${i})">🗑️</button>
  </td>
  </tr>`;
 }

 /* ===== weekly grouping ===== */
 let weekly={};

 for(let i=1;i<data.length;i++){
  let diff=data[i].km-data[i-1].km;
  if(diff>0){
   let key=getMonthWeek(data[i].date);
   weekly[key]=(weekly[key]||0)+diff;
  }
 }

 let labels=Object.keys(weekly);
 let values=Object.values(weekly);

 drawChart(labels,values,noData,base);
}

/* ================= CHART ================= */

function drawChart(labels,data,noData,name){
 let ctx=document.getElementById("chart").getContext("2d");

 if(window.chart)window.chart.destroy();

 if(labels.length===0){
  noData.innerHTML="⚠️ ยังไม่มีข้อมูล";
  return;
 }

 window.chart=new Chart(ctx,{
  type:'bar',
  data:{
   labels:labels,
   datasets:[{
    label:'km / week-month ('+name+')',
    data:data,
    backgroundColor:'#38bdf8'
   }]
  },
  options:{
   responsive:true,
   maintainAspectRatio:false
  }
 });
}

/* INIT */
date.valueAsDate=new Date();
render();
</script>

</body>
</html>
