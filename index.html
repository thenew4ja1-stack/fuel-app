<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Fuel Ultimate FINAL</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {font-family:sans-serif;background:#0f172a;color:#e2e8f0;margin:0;}
.container{max-width:900px;margin:auto;padding:15px;}
.card{background:#1e293b;padding:15px;margin-top:15px;border-radius:12px;}
input,select{padding:8px;margin:5px;border-radius:8px;border:none;background:#334155;color:white;}
button{padding:6px 12px;background:#38bdf8;border:none;border-radius:6px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{padding:6px;border-bottom:1px solid #475569;text-align:center;}
</style>
</head>

<body>
<div class="container">

<h2>⛽ Fuel Ultimate</h2>

<div class="card">
<select id="carSelect"></select>
<input id="newCar" placeholder="ชื่อรถ">
<input id="tankSize" placeholder="ความจุถัง">
<button onclick="addCar()">เพิ่มรถ</button>
</div>

<div class="card">
<form id="form">
<input type="date" id="date">
<input id="km" placeholder="กิโล">

ขีด:
<input type="range" id="fuelLevel" min="1" max="5" step="0.5" value="3"
oninput="fuelValue.innerText=this.value">
<span id="fuelValue">3</span>

<input id="liter" placeholder="ลิตร">
<input id="price" placeholder="ราคา">
<input id="total" readonly>
<input id="additive" placeholder="หัวเชื้อ">
<button>บันทึก</button>
</form>
</div>

<div class="card">
📊 km/L เฉลี่ย: <span id="avgKml">-</span>
</div>

<div class="card">
<select id="chartCarSelect"></select>
</div>

<div class="card">
<canvas id="chart" height="120"></canvas>
<div id="noData"></div>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>วันที่</th>
<th>รถ</th>
<th>กิโล</th>
<th>ขีด</th>
<th>ลิตร</th>
<th>ราคา</th>
<th>เงิน</th>
<th>หัวเชื้อ</th>
<th>km/L</th>
<th>จัดการ</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>
let db=JSON.parse(localStorage.getItem("fuelDB"))||{};
let cars=JSON.parse(localStorage.getItem("cars"))||{};
let currentCar=localStorage.getItem("currentCar")||"";
let editIndex=-1;

function save(){
 localStorage.setItem("fuelDB",JSON.stringify(db));
 localStorage.setItem("cars",JSON.stringify(cars));
 localStorage.setItem("currentCar",currentCar);
}

function ensureCar(){
 let keys=Object.keys(db);
 if(!currentCar && keys.length){
  currentCar=keys[0];
 }
}

function num(v){
 let n=parseFloat(v);
 return isNaN(n)?0:n;
}

function allow(input){
 if(!input) return;
 input.oninput=()=>{
  let v=input.value;
  if(!/^[-0-9.]*$/.test(v)) input.value=v.slice(0,-1);
  if((v.match(/\./g)||[]).length>1) input.value=v.slice(0,-1);
  if(v.includes("-")&&v.indexOf("-")!==0) input.value=v.replace("-","");
 };
}

["km","liter","price","additive","tankSize"].forEach(id=>{
 allow(document.getElementById(id));
});

let chartCarSelect=document.getElementById("chartCarSelect");

function addCar(){
 let n=newCar.value.trim();
 let t=parseFloat(tankSize.value);
 if(!n||isNaN(t))return;
 db[n]=[]; cars[n]={tank:t}; currentCar=n;
 save(); update(); render();
}

function update(){
 carSelect.innerHTML="";
 chartCarSelect.innerHTML="";

 Object.keys(db).forEach(c=>{
  let o1=document.createElement("option");
  o1.value=c;
  o1.text=c+" ("+cars[c].tank+"L)";
  if(c===currentCar)o1.selected=true;
  carSelect.appendChild(o1);

  let o2=document.createElement("option");
  o2.value=c;
  o2.text=c;
  chartCarSelect.appendChild(o2);
 });

 if(!chartCarSelect.value){
  chartCarSelect.value=currentCar;
 }
}

carSelect.onchange=()=>{
 currentCar=carSelect.value;
 save();
 render();
};

chartCarSelect.onchange=()=>{
 render();
};

liter.oninput=calc;
price.oninput=calc;

function calc(){
 let l=num(liter.value);
 let p=num(price.value);
 total.value=(l*p).toFixed(2);
}

form.onsubmit=e=>{
 e.preventDefault();
 if(!currentCar)return;

 let obj={
  date:date.value,
  km:num(km.value),
  fuelLevel:parseFloat(fuelLevel.value),
  liter:num(liter.value),
  price:num(price.value),
  additive:num(additive.value)
 };

 if(editIndex===-1){
  db[currentCar].push(obj);
 }else{
  db[currentCar][editIndex]=obj;
  editIndex=-1;
 }

 save(); render();

 // ✅ RESET เป็น "-"
 date.value="";
 km.value="-";
 fuelLevel.value=3;
 fuelValue.innerText=3;
 liter.value="-";
 price.value="-";
 total.value="0.00";
 additive.value="-";
};

function deleteRow(i){
 if(!confirm("ลบรายการนี้?"))return;
 db[currentCar].splice(i,1);
 save(); render();
}

function editRow(i){
 let d=db[currentCar][i];
 date.value=d.date;
 km.value=d.km;
 fuelLevel.value=d.fuelLevel;
 fuelValue.innerText=d.fuelLevel;
 liter.value=d.liter;
 price.value=d.price;
 additive.value=d.additive;
 editIndex=i;
}

function render(){
 ensureCar();
 update();

 let base = chartCarSelect.value || currentCar;
 let data = db[base] || [];

 let table=document.getElementById("table");
 let noData=document.getElementById("noData");
 table.innerHTML="";
 noData.innerHTML="";

 data.sort((a,b)=>new Date(a.date)-new Date(b.date));

 let kmlArr=[];

 // ===== km/L per row =====
 let kmlList=[];

 for(let i=1;i<data.length;i++){
  let kmNow=num(data[i].km);
  let kmPrev=num(data[i-1].km);
  let liter=num(data[i].liter);

  if(liter>0){
   let kml=(kmNow-kmPrev)/liter;
   if(!isNaN(kml)){
    kmlArr.push(kml);
    kmlList[i]=kml.toFixed(2);
   }
  }
 }

 // ===== table =====
 for(let i=0;i<data.length;i++){
  let d=data[i];

  let total=(num(d.liter)*num(d.price)).toFixed(2);

  table.innerHTML+=`
  <tr>
  <td>${d.date||"-"}</td>
  <td>${base}</td>
  <td>${d.km}</td>
  <td>${d.fuelLevel}</td>
  <td>${d.liter}</td>
  <td>${d.price}</td>
  <td>${total}</td>
  <td>${d.additive}</td>
  <td>${kmlList[i]||"-"}</td>
  <td>
  <button onclick="editRow(${i})">✏️</button>
  <button onclick="deleteRow(${i})">🗑️</button>
  </td>
  </tr>`;
 }

 document.getElementById("avgKml").innerText=
 kmlArr.length?(kmlArr.reduce((a,b)=>a+b,0)/kmlArr.length).toFixed(2):"-";

 // ===== chart (FIXED) =====
 let labels=[],values=[];

 for(let i=1;i<data.length;i++){
  let kmNow=num(data[i].km);
  let kmPrev=num(data[i-1].km);
  let liter=num(data[i].liter);

  if(liter>0){
   labels.push(data[i].date);
   values.push(((kmNow-kmPrev)/liter).toFixed(2));
  }
 }

 // 🔥 กราฟขึ้นแม้มี 1 ค่า
 if(values.length===0 && kmlArr.length>0){
  labels=["data"];
  values=[kmlArr[0].toFixed(2)];
 }

 drawChart(labels,values,noData,base);
}

function drawChart(labels,data,noData,carName){
 let ctx=document.getElementById("chart");

 if(window.chart)window.chart.destroy();

 if(labels.length===0){
  noData.innerHTML="⚠️ ยังไม่มีข้อมูลพอสำหรับกราฟ";
  return;
 }

 window.chart=new Chart(ctx,{
  type:'line',
  data:{
   labels:labels,
   datasets:[{
    label:'km/L ('+carName+')',
    data:data
   }]
  }
 });
}

render();
</script>

</body>
</html>
