<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Fuel Ultimate PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {font-family:sans-serif;background:#0f172a;color:#e2e8f0;margin:0;}
.container{max-width:900px;margin:auto;padding:15px;}
.card{background:#1e293b;padding:15px;margin-top:15px;border-radius:12px;}
input,select{padding:8px;margin:5px;border-radius:8px;border:none;background:#334155;color:white;}
button{padding:6px 12px;background:#38bdf8;border:none;border-radius:6px;font-weight:bold;margin:2px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{padding:6px;border-bottom:1px solid #475569;text-align:center;}
.good{color:#22c55e;} .warn{color:#ef4444;}
</style>
</head>

<body>
<div class="container">

<h2>⛽ Fuel Ultimate PRO</h2>

<div class="card">
<select id="carSelect"></select>
<input id="newCar" placeholder="ชื่อรถ">
<input id="tankSize" placeholder="ความจุถัง (ลิตร)">
<button onclick="addCar()">เพิ่มรถ</button>
</div>

<div class="card">
<form id="form">
<input type="date" id="date">
<input id="km" placeholder="กิโล หรือ -">

ขีด:
<input type="range" id="fuelLevel" min="1" max="5" step="0.5" value="3"
oninput="fuelValue.innerText=this.value">
<span id="fuelValue">3</span>

<input id="liter" placeholder="ลิตร">
<input id="price" placeholder="ราคา">
<input id="total" placeholder="เงิน" readonly>
<input id="additive" placeholder="หัวเชื้อ (ลิตร)">
<button>บันทึก</button>
</form>
</div>

<div class="card">
📊 km/L เฉลี่ย: <span id="avgKml">-</span>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>วันที่</th><th>กิโล</th><th>ขีด</th><th>ลิตร</th>
<th>ราคา</th><th>เงิน</th><th>หัวเชื้อ</th><th>km/L</th><th>จัดการ</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>
let db=JSON.parse(localStorage.getItem("fuelDB"))||{};
let cars=JSON.parse(localStorage.getItem("cars"))||{};
let currentCar=localStorage.getItem("currentCar")||"";
let editIndex=-1;

function save(){
 localStorage.setItem("fuelDB",JSON.stringify(db));
 localStorage.setItem("cars",JSON.stringify(cars));
 localStorage.setItem("currentCar",currentCar);
}

function parseVal(v){
 if(v===""||v==="-" ) return "-";
 let n=parseFloat(v);
 return isNaN(n)?"-":n;
}

function allow(input){
 input.oninput=()=>{
  let v=input.value;
  if(!/^[-0-9.]*$/.test(v)) input.value=v.slice(0,-1);
  if((v.match(/\./g)||[]).length>1) input.value=v.slice(0,-1);
  if(v.includes("-")&&v.indexOf("-")!==0) input.value=v.replace("-","");
 };
}

["km","liter","price","additive","tankSize"].forEach(id=>allow(window[id]));

function addCar(){
 let n=newCar.value.trim();
 let t=parseFloat(tankSize.value);
 if(!n||isNaN(t))return;
 db[n]=[]; cars[n]={tank:t}; currentCar=n;
 save(); update(); render();
}

function update(){
 carSelect.innerHTML="";
 Object.keys(db).forEach(c=>{
  let o=document.createElement("option");
  o.value=c;
  o.text=c+" ("+cars[c].tank+"L)";
  if(c===currentCar)o.selected=true;
  carSelect.appendChild(o);
 });
}

carSelect.onchange=()=>{currentCar=carSelect.value;save();render();};

liter.oninput=calc;
price.oninput=calc;

function calc(){
 let l=parseFloat(liter.value)||0;
 let p=parseFloat(price.value)||0;
 total.value=(l*p).toFixed(2);
}

form.onsubmit=e=>{
 e.preventDefault();
 if(!currentCar)return;

 let obj={
  date:date.value,
  km:parseVal(km.value),
  fuelLevel:parseFloat(fuelLevel.value),
  liter:parseVal(liter.value),
  price:parseVal(price.value),
  additive:parseVal(additive.value)
 };

 if(editIndex===-1){
  db[currentCar].push(obj);
 }else{
  db[currentCar][editIndex]=obj;
  editIndex=-1;
 }

 save(); render();
 form.reset();
};

function deleteRow(i){
 if(!confirm("ลบรายการนี้?"))return;
 db[currentCar].splice(i,1);
 save(); render();
}

function editRow(i){
 let d=db[currentCar][i];

 date.value=d.date;
 km.value=d.km;
 fuelLevel.value=d.fuelLevel;
 fuelValue.innerText=d.fuelLevel;
 liter.value=d.liter;
 price.value=d.price;
 additive.value=d.additive;

 editIndex=i;
}

function render(){
 let data=db[currentCar]||[];
 let table=document.getElementById("table");
 table.innerHTML="";

 let kmlArr=[],monthMap={};

 for(let i=0;i<data.length;i++){
  let d=data[i],prev=data[i-1];
  let kml="-";

  if(i>0&&!isNaN(d.km)&&!isNaN(prev.km)&&!isNaN(d.liter)){
   let dist=d.km-prev.km;
   kml=(dist/d.liter).toFixed(2);
   kmlArr.push(parseFloat(kml));

   let m=d.date.slice(0,7);
   if(!monthMap[m])monthMap[m]=[];
   monthMap[m].push(parseFloat(kml));
  }

  let total=(!isNaN(d.liter)&&!isNaN(d.price))?(d.liter*d.price).toFixed(2):"-";

  table.innerHTML+=`
  <tr>
  <td>${d.date||"-"}</td>
  <td>${d.km}</td>
  <td>${d.fuelLevel}</td>
  <td>${d.liter}</td>
  <td>${d.price}</td>
  <td>${total}</td>
  <td>${d.additive}</td>
  <td>${kml}</td>
  <td>
  <button onclick="editRow(${i})">✏️</button>
  <button onclick="deleteRow(${i})">🗑️</button>
  </td>
  </tr>`;
 }

 document.getElementById("avgKml").innerText=
  kmlArr.length?(kmlArr.reduce((a,b)=>a+b,0)/kmlArr.length).toFixed(2):"-";

 let labels=[],values=[];
 for(let m in monthMap){
  let avg=monthMap[m].reduce((a,b)=>a+b,0)/monthMap[m].length;
  labels.push(m);
  values.push(avg.toFixed(2));
 }

 drawChart(labels,values);
}

function drawChart(labels,data){
 let ctx=document.getElementById("chart");
 if(window.chart)window.chart.destroy();

 window.chart=new Chart(ctx,{
  type:'line',
  data:{labels:labels,datasets:[{label:'km/L ต่อเดือน',data:data}]}
 });
}

update();
render();
</script>

</body>
</html>
