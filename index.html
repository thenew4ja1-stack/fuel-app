<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Fuel System PRO - Full Control</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
<style>
body {font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;background:#0f172a;color:#e2e8f0;margin:0;}
.container{max-width:1100px;margin:auto;padding:15px;}
.card{background:#1e293b;padding:20px;margin-top:15px;border-radius:12px;box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);}
input,select{padding:10px;margin:5px;border-radius:8px;border:1px solid #334155;background:#334155;color:white;width:145px;outline:none;}
button{padding:10px 18px;background:#38bdf8;border:none;border-radius:6px;cursor:pointer;font-weight:bold;transition:0.2s;}
button:hover{background:#0ea5e9;transform:scale(1.02);}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th{background:#334155;padding:12px;color:#38bdf8;text-transform:uppercase;font-size:0.85em;}
td{padding:10px;border-bottom:1px solid #334155;text-align:center;font-size: 0.95em;}
.btn-del{background:#ef4444; color:white;}
.btn-edit{background:#f59e0b; color:white;}
.car-controls { display: inline-flex; align-items: center; gap: 5px; flex-wrap: wrap; }
h2 {color: #38bdf8; margin: 0 0 10px 0;}
</style>
</head>
<body>

<div class="container">
  <h2>⛽ Fuel System PRO</h2>
  
  <div class="card">
    <div class="car-controls">
      <select id="carSelect"></select>
      <button class="btn-edit" onclick="editCarName()">✏️ แก้ไขชื่อรถ</button>
      <button class="btn-del" onclick="deleteCar()">🗑️ ลบรถคันนี้</button>
      <span style="margin: 0 15px; border-left: 1px solid #475569; height: 30px;"></span>
      <input id="newCar" placeholder="ชื่อรถใหม่">
      <input id="tankSize" type="number" placeholder="ความจุถัง (L)">
      <button onclick="addCar()">➕ เพิ่มรถใหม่</button>
    </div>
  </div>

  <div class="card">
    <form id="form">
      <input type="date" id="date">
      <input id="km" type="number" step="any" placeholder="ระยะที่วิ่ง (Trip กม.)">
      <input type="range" id="fuelLevel" min="1" max="5" step="0.5" value="3" oninput="fuelValue.innerText=this.value">
      <span style="font-weight:bold; color:#38bdf8;"><span id="fuelValue">3</span> ขีด</span>
      <br>
      <input id="liter" type="number" step="any" placeholder="ลิตร">
      <input id="price" type="number" step="any" placeholder="ราคา/ลิตร">
      <input id="additive" placeholder="หัวเชื้อ">
      <button type="submit">💾 บันทึกข้อมูล</button>
    </form>
  </div>

  <div class="card" style="height:400px;">
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <select id="chartCarSelect" style="float:right"></select>
    <h3>📋 ประวัติย้อนหลัง</h3>
    <table>
      <thead>
        <tr>
          <th>วันที่</th>
          <th>รถ</th>
          <th>กิโล (Trip)</th>
          <th>ขีด</th>
          <th>ลิตร</th>
          <th>ราคา</th>
          <th>รวมเงิน</th>
          <th>หัวเชื้อ</th>
          <th>จัดการ</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>
</div>

<script>
let db = JSON.parse(localStorage.getItem("fuelDB")) || {};
let cars = JSON.parse(localStorage.getItem("cars")) || {};
let currentCar = localStorage.getItem("currentCar") || "";
let myChart = null;
let editIndex = -1;

Chart.register(ChartDataLabels);

function init() {
    let keys = Object.keys(db);
    if(keys.length > 0 && (!currentCar || !db[currentCar])) currentCar = keys[0];
    date.valueAsDate = new Date();
    updateUI();
    render();
}

function save() {
    localStorage.setItem("fuelDB", JSON.stringify(db));
    localStorage.setItem("cars", JSON.stringify(cars));
    localStorage.setItem("currentCar", currentCar);
}

/* ================= จัดการรถ (Car Management) ================= */

function addCar() {
    let n = newCar.value.trim();
    let t = parseFloat(tankSize.value);
    if(!n || isNaN(t)) return alert("กรุณาระบุชื่อรถและขนาดถัง");
    if(!db[n]) db[n] = [];
    cars[n] = {tank:t};
    currentCar = n;
    save(); updateUI(); render();
    newCar.value=""; tankSize.value="";
}

function deleteCar() {
    if(!currentCar) return;
    if(confirm(`ยืนยันการลบรถ "${currentCar}" และข้อมูลทั้งหมด?`)) {
        delete db[currentCar];
        delete cars[currentCar];
        let keys = Object.keys(db);
        currentCar = keys.length > 0 ? keys[0] : "";
        save(); updateUI(); render();
    }
}

function editCarName() {
    if(!currentCar) return;
    let newName = prompt("แก้ไขชื่อรถ:", currentCar);
    if(newName && newName !== currentCar) {
        db[newName] = db[currentCar];
        cars[newName] = cars[currentCar];
        delete db[currentCar];
        delete cars[currentCar];
        currentCar = newName;
        save(); updateUI(); render();
    }
}

/* ================= ระบบหลัก ================= */

function updateUI() {
    carSelect.innerHTML = "";
    chartCarSelect.innerHTML = "";
    Object.keys(db).forEach(c => {
        carSelect.add(new Option(c, c));
        chartCarSelect.add(new Option(c, c));
    });
    carSelect.value = currentCar;
    chartCarSelect.value = currentCar;
}

carSelect.onchange = () => { currentCar = carSelect.value; save(); render(); };
chartCarSelect.onchange = () => { currentCar = chartCarSelect.value; save(); render(); };

form.onsubmit = e => {
    e.preventDefault();
    if(!currentCar) return alert("กรุณาเพิ่มรถก่อน");
    let obj = {
        date: date.value,
        km: parseFloat(km.value) || 0,
        fuelLevel: parseFloat(fuelLevel.value),
        liter: parseFloat(liter.value) || 0,
        price: parseFloat(price.value) || 0,
        additive: additive.value || "-"
    };
    if(editIndex === -1) db[currentCar].push(obj);
    else { db[currentCar][editIndex] = obj; editIndex = -1; }
    save(); render();
    km.value = ""; liter.value = ""; price.value = ""; additive.value = "";
};

function deleteRow(i) {
    if(confirm("ลบข้อมูลชุดนี้?")) { db[currentCar].splice(i, 1); save(); render(); }
}

function editRow(i) {
    let d = db[currentCar][i];
    date.value = d.date; km.value = d.km; fuelLevel.value = d.fuelLevel;
    fuelValue.innerText = d.fuelLevel; liter.value = d.liter;
    price.value = d.price; additive.value = d.additive;
    editIndex = i; window.scrollTo(0,0);
}

function render() {
    let data = db[currentCar] || [];
    let tableBody = document.getElementById("table");
    tableBody.innerHTML = "";
    data.sort((a, b) => new Date(a.date) - new Date(b.date));

    data.forEach((d, i) => {
        tableBody.innerHTML += `<tr>
            <td>${d.date}</td><td>${currentCar}</td>
            <td style="font-weight:bold; color:#38bdf8">${d.km}</td>
            <td>${d.fuelLevel}</td><td>${d.liter}</td><td>${d.price}</td>
            <td>${(d.liter * d.price).toFixed(2)}</td><td>${d.additive}</td>
            <td><button class="btn-edit" onclick="editRow(${i})">✏️</button>
            <button class="btn-del" onclick="deleteRow(${i})">🗑️</button></td></tr>`;
    });

    let weeklyTotals = {};
    data.forEach(d => {
        let dt = new Date(d.date);
        let label = `${dt.getMonth()+1}.${Math.ceil(dt.getDate()/7)}`; 
        weeklyTotals[label] = (weeklyTotals[label] || 0) + d.km;
    });

    let labels = Object.keys(weeklyTotals).sort((a, b) => {
        let [m1, w1] = a.split('.').map(Number);
        let [m2, w2] = b.split('.').map(Number);
        return m1 !== m2 ? m1 - m2 : w1 - w2;
    });
    let values = labels.map(l => weeklyTotals[l]);
    drawChart(labels, values);
}

function drawChart(labels, values) {
    let ctx = document.getElementById("chart").getContext("2d");
    if(myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'ระยะทางสะสมรายสัปดาห์ (km)',
                data: values,
                backgroundColor: 'rgba(56, 189, 248, 0.85)',
                borderRadius: 8,
                barPercentage: 0.5
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
                legend: { labels: { color: '#e2e8f0', font: { size: 16, weight: 'bold' } } },
                datalabels: {
                    color: '#fff', anchor: 'end', align: 'top',
                    font: { size: 15, weight: 'bold' },
                    formatter: (v) => v + " km"
                }
            },
            scales: {
                y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', font: { size: 14 } } },
                x: { ticks: { color: '#ffffff', font: { size: 16, weight: 'bold' } } }
            }
        }
    });
}
init();
</script>
</body>
</html>
