<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Fuel System PRO - Trip Mode V2</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

<style>
body {font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;background:#0f172a;color:#e2e8f0;margin:0;}
.container{max-width:1100px;margin:auto;padding:15px;}
.card{background:#1e293b;padding:20px;margin-top:15px;border-radius:12px;box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);}
input,select{padding:10px;margin:5px;border-radius:8px;border:1px solid #334155;background:#334155;color:white;width:140px;outline:none;}
input:focus{border-color:#38bdf8;}
button{padding:10px 18px;background:#38bdf8;border:none;border-radius:6px;cursor:pointer;font-weight:bold;transition:0.2s;}
button:hover{background:#0ea5e9;transform:scale(1.05);}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th{background:#334155;padding:12px;color:#38bdf8;text-transform:uppercase;font-size:0.85em;}
td{padding:10px;border-bottom:1px solid #334155;text-align:center;font-size: 0.95em;}
.btn-del{background:#ef4444; color:white;}
.btn-edit{background:#f59e0b; color:white;}
h2 {color: #38bdf8; margin-bottom: 5px;}
p.sub {color: #94a3b8; font-size: 0.9em; margin-bottom: 20px;}
</style>
</head>
<body>

<div class="container">
  <h2>⛽ Fuel System PRO</h2>
  <p class="sub">*บันทึกระยะทางจริงจาก Trip Meter และรวมผลให้รายสัปดาห์</p>

  <div class="card">
    <select id="carSelect"></select>
    <input id="newCar" placeholder="ชื่อรถ (เช่น Dmax)">
    <input id="tankSize" placeholder="ความจุถัง (ลิตร)">
    <button onclick="addCar()">➕ เพิ่มรถ</button>
  </div>

  <div class="card">
    <form id="form">
      <input type="date" id="date">
      <input id="km" type="number" step="any" placeholder="ระยะทาง (Trip กม.)">
      <input type="range" id="fuelLevel" min="1" max="5" step="0.5" value="3" oninput="fuelValue.innerText=this.value">
      <span style="font-weight:bold; color:#38bdf8;"><span id="fuelValue">3</span> ขีด</span>
      <br>
      <input id="liter" type="number" step="any" placeholder="จำนวนลิตร">
      <input id="price" type="number" step="any" placeholder="ราคาน้ำมันต่อลิตร">
      <input id="additive" placeholder="หัวเชื้อ (ถ้ามี)">
      <button type="submit">💾 บันทึกข้อมูล</button>
    </form>
  </div>

  <div class="card" style="height:400px;">
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <select id="chartCarSelect" style="float:right"></select>
    <h3>📋 ประวัติย้อนหลัง</h3>
    <table>
      <thead>
        <tr>
          <th>วันที่</th>
          <th>รถ</th>
          <th>กิโล (Trip)</th>
          <th>ขีด</th>
          <th>ลิตร</th>
          <th>ราคา</th>
          <th>รวมเงิน</th>
          <th>หัวเชื้อ</th>
          <th>จัดการ</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>
</div>

<script>
let db = JSON.parse(localStorage.getItem("fuelDB")) || {};
let cars = JSON.parse(localStorage.getItem("cars")) || {};
let currentCar = localStorage.getItem("currentCar") || "";
let myChart = null;
let editIndex = -1;

// ลงทะเบียน Plugin สำหรับแสดงเลขบนกราฟ
Chart.register(ChartDataLabels);

function init() {
    let keys = Object.keys(db);
    if(keys.length > 0 && !currentCar) currentCar = keys[0];
    date.valueAsDate = new Date();
    updateUI();
    render();
}

function save() {
    localStorage.setItem("fuelDB", JSON.stringify(db));
    localStorage.setItem("cars", JSON.stringify(cars));
    localStorage.setItem("currentCar", currentCar);
}

function addCar() {
    let n = newCar.value.trim();
    let t = parseFloat(tankSize.value);
    if(!n || isNaN(t)) return alert("กรุณาระบุชื่อรถและขนาดถัง");
    if(!db[n]) db[n] = [];
    cars[n] = {tank:t};
    currentCar = n;
    save(); updateUI(); render();
    newCar.value=""; tankSize.value="";
}

function updateUI() {
    carSelect.innerHTML = "";
    chartCarSelect.innerHTML = "";
    Object.keys(db).forEach(c => {
        carSelect.add(new Option(c, c));
        chartCarSelect.add(new Option(c, c));
    });
    carSelect.value = currentCar;
    chartCarSelect.value = currentCar;
}

carSelect.onchange = () => { currentCar = carSelect.value; save(); render(); };
chartCarSelect.onchange = () => { currentCar = chartCarSelect.value; save(); render(); };

form.onsubmit = e => {
    e.preventDefault();
    if(!currentCar) return alert("กรุณาเพิ่มรถก่อนบันทึก");
    
    let obj = {
        date: date.value,
        km: parseFloat(km.value) || 0,
        fuelLevel: parseFloat(fuelLevel.value),
        liter: parseFloat(liter.value) || 0,
        price: parseFloat(price.value) || 0,
        additive: additive.value || "-"
    };

    if(editIndex === -1) db[currentCar].push(obj);
    else { db[currentCar][editIndex] = obj; editIndex = -1; }

    save(); render();
    km.value = ""; liter.value = ""; price.value = ""; additive.value = "";
};

function deleteRow(i) {
    if(confirm("ต้องการลบข้อมูลชุดนี้ใช่ไหม?")) { db[currentCar].splice(i, 1); save(); render(); }
}

function editRow(i) {
    let d = db[currentCar][i];
    date.value = d.date;
    km.value = d.km;
    fuelLevel.value = d.fuelLevel;
    fuelValue.innerText = d.fuelLevel;
    liter.value = d.liter;
    price.value = d.price;
    additive.value = d.additive;
    editIndex = i;
    window.scrollTo(0,0);
}

function render() {
    let data = db[currentCar] || [];
    let tableBody = document.getElementById("table");
    tableBody.innerHTML = "";
    
    data.sort((a, b) => new Date(a.date) - new Date(b.date));

    data.forEach((d, i) => {
        let total = (d.liter * d.price).toFixed(2);
        tableBody.innerHTML += `
            <tr>
                <td>${d.date}</td>
                <td>${currentCar}</td>
                <td style="font-weight:bold; color:#38bdf8">${d.km}</td>
                <td>${d.fuelLevel}</td>
                <td>${d.liter}</td>
                <td>${d.price}</td>
                <td>${total}</td>
                <td>${d.additive}</td>
                <td>
                    <button class="btn-edit" onclick="editRow(${i})">✏️</button>
                    <button class="btn-del" onclick="deleteRow(${i})">🗑️</button>
                </td>
            </tr>`;
    });

    let weeklyTotals = {};
    data.forEach(d => {
        let dt = new Date(d.date);
        let label = `${dt.getMonth()+1}.${Math.ceil(dt.getDate()/7)}`; 
        weeklyTotals[label] = (weeklyTotals[label] || 0) + d.km;
    });

    let labels = Object.keys(weeklyTotals).sort((a, b) => {
        let [m1, w1] = a.split('.').map(Number);
        let [m2, w2] = b.split('.').map(Number);
        return m1 !== m2 ? m1 - m2 : w1 - w2;
    });
    let values = labels.map(l => weeklyTotals[l]);

    drawChart(labels, values);
}

function drawChart(labels, values) {
    let ctx = document.getElementById("chart").getContext("2d");
    if(myChart) myChart.destroy();
    
    myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'ระยะทางสะสมรายสัปดาห์ (km)',
                data: values,
                backgroundColor: 'rgba(56, 189, 248, 0.8)',
                borderColor: '#38bdf8',
                borderWidth: 2,
                borderRadius: 8,
                barPercentage: 0.6 // ทำให้แท่งกราฟกว้างขึ้น
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { labels: { color: '#e2e8f0', font: { size: 14, weight: 'bold' } } },
                // ตั้งค่าตัวเลขบนหัวแท่ง
                datalabels: {
                    color: '#fff',
                    anchor: 'end',
                    align: 'top',
                    offset: 5,
                    font: { size: 13, weight: 'bold' },
                    formatter: (value) => value + " km"
                }
            },
            scales: {
                y: { 
                    beginAtZero: true,
                    grid: { color: '#334155' },
                    ticks: { color: '#94a3b8', font: { size: 12 } }
                },
                x: { 
                    grid: { display: false },
                    ticks: { color: '#e2e8f0', font: { size: 14, weight: 'bold' } }
                }
            }
        }
    });
}

init();
</script>
</body>
</html>
