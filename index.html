<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Fuel Ultimate</title>

<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#eef2f5;}
input,button,select { padding:8px; margin:5px;}
table { width:100%; border-collapse:collapse; margin-top:20px;}
th,td { border:1px solid #ccc; padding:6px; text-align:center;}
.card { background:white; padding:15px; margin-top:15px; border-radius:10px;}
.warn { color:red; font-weight:bold;}
.good { color:green; font-weight:bold;}
</style>
</head>

<body>

<h2>⛽ Fuel Ultimate 🚗</h2>

<div class="card">
เลือกรถ:
<select id="carSelect"></select>
<input type="text" id="newCar" placeholder="ชื่อรถ">
ความจุถัง:
<input type="text" id="tankSize" placeholder="ลิตร">
<button onclick="addCar()">เพิ่ม</button>
</div>

<div class="card">
<form id="form">

วันที่: <input type="date" id="date">

กิโล:
<input type="text" id="km" placeholder="544.09 หรือ -">

ขีด:
<input type="range" id="fuelLevel" min="1" max="5" step="0.5" value="3"
oninput="fuelValue.innerText=this.value">
<span id="fuelValue">3</span>

ลิตร:
<input type="text" id="liter" placeholder="เช่น 1.5">

ราคา:
<input type="text" id="price" placeholder="เช่น 31.2">

เงิน:
<input type="text" id="total" readonly>

หัวเชื้อ:
<input type="text" id="additive" placeholder="0.5">

<button>บันทึก</button>
</form>
</div>

<div class="card">
<h3>📊 วิเคราะห์</h3>
km/L เฉลี่ย: <span id="avgKml">-</span><br>
ราคาน้ำมัน: <span id="priceStatus">-</span><br>
แจ้งเตือน: <span id="alertFuel">-</span>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<table>
<thead>
<tr>
<th>วันที่</th><th>km/L</th><th>ราคา</th><th>สถานะ</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
let db = JSON.parse(localStorage.getItem("fuelDB")) || {};
let cars = JSON.parse(localStorage.getItem("cars")) || {};
let currentCar = localStorage.getItem("currentCar") || "";

function save(){
 localStorage.setItem("fuelDB", JSON.stringify(db));
 localStorage.setItem("cars", JSON.stringify(cars));
 localStorage.setItem("currentCar", currentCar);
}

function parseVal(v){
 return (v === "" || v === "-") ? "-" : parseFloat(v);
}

// กันพิมพ์มั่ว + รองรับทศนิยม
function allowDecimal(input){
 input.addEventListener("input", function(){
   let val = this.value;

   if(!/^[-0-9.]*$/.test(val)){
     this.value = val.slice(0, -1);
   }

   if((val.match(/\./g) || []).length > 1){
     this.value = val.slice(0, -1);
   }

   if(val.includes("-") && val.indexOf("-") !== 0){
     this.value = val.replace("-", "");
   }
 });
}

allowDecimal(km);
allowDecimal(liter);
allowDecimal(price);
allowDecimal(additive);
allowDecimal(tankSize);

function addCar(){
 let name=newCar.value.trim();
 let tank=parseFloat(tankSize.value);

 if(!name || !tank) return;

 db[name]=[];
 cars[name]={tank:tank};
 currentCar=name;

 save();
 updateCarList();
 render();
}

function updateCarList(){
 carSelect.innerHTML="";
 Object.keys(db).forEach(c=>{
   let o=document.createElement("option");
   o.value=c; o.text=c + " (" + cars[c].tank + "L)";
   if(c===currentCar)o.selected=true;
   carSelect.appendChild(o);
 });
}

carSelect.onchange=()=>{
 currentCar=carSelect.value;
 save(); render();
};

function calc(){
 let l=parseFloat(liter.value)||0;
 let p=parseFloat(price.value)||0;
 total.value=(l*p).toFixed(2);
}
liter.oninput=calc;
price.oninput=calc;

form.onsubmit=e=>{
 e.preventDefault();

 let arr=db[currentCar]||[];

 arr.push({
   date:date.value,
   km:parseVal(km.value),
   fuelLevel:parseFloat(fuelLevel.value),
   liter:parseVal(liter.value),
   price:parseVal(price.value)
 });

 db[currentCar]=arr;
 save(); render();
};

function avg(arr){
 return arr.reduce((a,b)=>a+b,0)/arr.length;
}

function render(){
 let data=db[currentCar]||[];
 let table=document.getElementById("table");
 table.innerHTML="";

 let kmlArr=[], priceArr=[], labels=[], kmlData=[];

 for(let i=1;i<data.length;i++){
   let d=data[i];
   let prev=data[i-1];

   if(isNaN(d.km)||isNaN(prev.km)||isNaN(d.liter)) continue;

   let dist=d.km-prev.km;
   let kml=dist/d.liter;

   kmlArr.push(kml);
   priceArr.push(d.price);

   labels.push(d.date);
   kmlData.push(kml.toFixed(2));

   let status = d.price < avg(priceArr) ? "ถูก" : "แพง";

   table.innerHTML+=`
   <tr>
   <td>${d.date}</td>
   <td>${kml.toFixed(2)}</td>
   <td>${d.price}</td>
   <td class="${status==='ถูก'?'good':'warn'}">${status}</td>
   </tr>`;
 }

 let avgKml = kmlArr.length ? avg(kmlArr).toFixed(2) : "-";
 document.getElementById("avgKml").innerText = avgKml;

 let avgPrice = priceArr.length ? avg(priceArr) : 0;
 let lastPrice = priceArr[priceArr.length-1] || 0;

 document.getElementById("priceStatus").innerHTML =
   lastPrice < avgPrice ? "<span class='good'>ถูก</span>" :
   "<span class='warn'>แพง</span>";

 let last = data[data.length-1];
 let alertMsg = "-";
 if(last && last.fuelLevel <= 2){
   alertMsg = "⚠️ ควรเติมน้ำมันแล้ว";
 }
 document.getElementById("alertFuel").innerText = alertMsg;

 drawChart(labels, kmlData);
}

function drawChart(labels,data){
 let ctx=document.getElementById("chart");

 if(window.myChart) window.myChart.destroy();

 window.myChart=new Chart(ctx,{
   type:'line',
   data:{
     labels:labels,
     datasets:[{
       label:'km/L',
       data:data
     }]
   }
 });
}

updateCarList();
render();

if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
