<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Fuel System PRO - Trip Mode</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {font-family:sans-serif;background:#0f172a;color:#e2e8f0;margin:0;}
.container{max-width:1000px;margin:auto;padding:15px;}
.card{background:#1e293b;padding:15px;margin-top:15px;border-radius:12px;}
input,select{padding:8px;margin:5px;border-radius:8px;border:none;background:#334155;color:white;width:130px;}
button{padding:8px 12px;background:#38bdf8;border:none;border-radius:6px;cursor:pointer;font-weight:bold;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{padding:8px;border-bottom:1px solid #475569;text-align:center;font-size: 0.9em;}
.btn-del{background:#ef4444; color:white;}
.btn-edit{background:#f59e0b; color:white;}
</style>
</head>
<body>

<div class="container">
  <h2>⛽ Fuel System PRO (Trip Reset Mode)</h2>

  <div class="card">
    <select id="carSelect"></select>
    <input id="newCar" placeholder="ชื่อรถ">
    <input id="tankSize" placeholder="ความจุถัง">
    <button onclick="addCar()">➕ เพิ่มรถ</button>
  </div>

  <div class="card">
    <form id="form">
      <input type="date" id="date">
      <input id="km" placeholder="กิโล (Trip)">
      <input type="range" id="fuelLevel" min="1" max="5" step="0.5" value="3" oninput="fuelValue.innerText=this.value">
      <span id="fuelValue">3</span> ขีด
      <br>
      <input id="liter" placeholder="ลิตร">
      <input id="price" placeholder="ราคา">
      <input id="additive" placeholder="หัวเชื้อ">
      <button type="submit">บันทึก</button>
    </form>
  </div>

  <div class="card" style="height:320px;">
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <select id="chartCarSelect" style="float:right"></select>
    <table>
      <thead>
        <tr>
          <th>วันที่</th>
          <th>รถ</th>
          <th>กิโล</th>
          <th>ขีด</th>
          <th>ลิตร</th>
          <th>ราคา</th>
          <th>เงิน</th>
          <th>หัวเชื้อ</th>
          <th>จัดการ</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>
</div>

<script>
let db = JSON.parse(localStorage.getItem("fuelDB")) || {};
let cars = JSON.parse(localStorage.getItem("cars")) || {};
let currentCar = localStorage.getItem("currentCar") || "";
let myChart = null;
let editIndex = -1;

function init() {
    let keys = Object.keys(db);
    if(keys.length > 0 && !currentCar) currentCar = keys[0];
    date.valueAsDate = new Date();
    updateUI();
    render();
}

function save() {
    localStorage.setItem("fuelDB", JSON.stringify(db));
    localStorage.setItem("cars", JSON.stringify(cars));
    localStorage.setItem("currentCar", currentCar);
}

function addCar() {
    let n = newCar.value.trim();
    let t = parseFloat(tankSize.value);
    if(!n || isNaN(t)) return;
    if(!db[n]) db[n] = [];
    cars[n] = {tank:t};
    currentCar = n;
    save(); updateUI(); render();
    newCar.value=""; tankSize.value="";
}

function updateUI() {
    carSelect.innerHTML = "";
    chartCarSelect.innerHTML = "";
    Object.keys(db).forEach(c => {
        carSelect.add(new Option(c, c));
        chartCarSelect.add(new Option(c, c));
    });
    carSelect.value = currentCar;
    chartCarSelect.value = currentCar;
}

carSelect.onchange = () => { currentCar = carSelect.value; save(); render(); };
chartCarSelect.onchange = () => { currentCar = chartCarSelect.value; save(); render(); };

form.onsubmit = e => {
    e.preventDefault();
    if(!currentCar) return alert("เพิ่มรถก่อน");
    
    let obj = {
        date: date.value,
        km: parseFloat(km.value) || 0,
        fuelLevel: parseFloat(fuelLevel.value),
        liter: parseFloat(liter.value) || 0,
        price: parseFloat(price.value) || 0,
        additive: additive.value || "-"
    };

    if(editIndex === -1) db[currentCar].push(obj);
    else { db[currentCar][editIndex] = obj; editIndex = -1; }

    save(); render();
    km.value = ""; liter.value = ""; price.value = ""; additive.value = "";
};

function deleteRow(i) {
    if(confirm("ลบ?")) { db[currentCar].splice(i, 1); save(); render(); }
}

function editRow(i) {
    let d = db[currentCar][i];
    date.value = d.date;
    km.value = d.km;
    fuelLevel.value = d.fuelLevel;
    fuelValue.innerText = d.fuelLevel;
    liter.value = d.liter;
    price.value = d.price;
    additive.value = d.additive;
    editIndex = i;
}

function render() {
    let data = db[currentCar] || [];
    let tableBody = document.getElementById("table");
    tableBody.innerHTML = "";
    
    data.sort((a, b) => new Date(a.date) - new Date(b.date));

    // 1. วาดตารางแบบเดิม (ครบทุกช่อง)
    data.forEach((d, i) => {
        let total = (d.liter * d.price).toFixed(2);
        tableBody.innerHTML += `
            <tr>
                <td>${d.date}</td>
                <td>${currentCar}</td>
                <td>${d.km}</td>
                <td>${d.fuelLevel}</td>
                <td>${d.liter}</td>
                <td>${d.price}</td>
                <td>${total}</td>
                <td>${d.additive}</td>
                <td>
                    <button class="btn-edit" onclick="editRow(${i})">✏️</button>
                    <button class="btn-del" onclick="deleteRow(${i})">🗑️</button>
                </td>
            </tr>`;
    });

    // 2. คำนวณกราฟแบบ Trip Sum (รายสัปดาห์)
    let weeklyTotals = {};
    data.forEach(d => {
        let dt = new Date(d.date);
        let label = `${dt.getMonth()+1}.${Math.ceil(dt.getDate()/7)}`; 
        weeklyTotals[label] = (weeklyTotals[label] || 0) + d.km;
    });

    let labels = Object.keys(weeklyTotals).sort((a, b) => {
        let [m1, w1] = a.split('.').map(Number);
        let [m2, w2] = b.split('.').map(Number);
        return m1 !== m2 ? m1 - m2 : w1 - w2;
    });
    let values = labels.map(l => weeklyTotals[l]);

    drawChart(labels, values);
}

function drawChart(labels, values) {
    let ctx = document.getElementById("chart").getContext("2d");
    if(myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'ระยะทางสะสมรายสัปดาห์ (km)',
                data: values,
                backgroundColor: '#38bdf8'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { y: { beginAtZero: true } }
        }
    });
}

init();
</script>
</body>
</html>
